<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory</title>
</head>

<body>
    <main class="home-screen">

        <button class="home-screen__settings" type="button" aria-label="Settings">
            <img
                class="home-screen__settings-icon"
                src="/src/assets/icon/stadia_controller (1).png"
                alt="Settings">
        </button>

        <div class="home-screen__controller-container">
            <img
                class="home-screen__controller"
                src="/src/assets/icon/stadia_controller.png"
                alt="Game Controller">
        </div>
        <div class="home-screen__header">
            <p class="home-screen__eyebrow">
                It's play time.
            </p>
            <h1 class="home-screen__title">
                Ready to play?
            </h1>
        </div>
        <button class="btn btn--primary" type="button">
            <span class="btn__text">
                Play
            </span>
            <span class="btn__arrow-icon">
                <img
                    class="btn__arrow"
                    src="/src/assets/icon/Arrow 1.png"
                    alt="Arrow">
            </span>
        </button>
    </main>

    <script type="module" src="/src/main.ts"></script>

</body>
</html>
