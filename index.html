<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory</title>
</head>

<body>
  <main class="memory-home">

    <button class="memory-home__settings-button" type="button" aria-label="Settings">
      <img
        class="memory-home__settings-icon"
        src="/src/assets/icon/stadia_controller (1).png"
        alt="Settings">
    </button>

    <img
      class="memory-home__controller"
      src="/src/assets/icon/stadia_controller.png"
      alt="Game Controller">

    <div class="memory-home__content">
      <p class="memory-home__small-title">It's play time.</p>
      <h1 class="memory-home__main-title">Ready to play?</h1>
    </div>

    <button class="start-button start-button--yellow" type="button">
      <span class="start-button__controller-box">
        <img
          class="start-button__controller-icon"
          src="/src/assets/icon/stadia_controller (1).png"
          alt="">
      </span>

      <span class="start-button__text">Play</span>

      <span class="start-button__arrow-box">
        <img
          class="start-button__arrow-icon"
          src="/src/assets/icon/Arrow 1.png"
          alt="">
      </span>
    </button>

  </main>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
